<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LỌ</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f;--surface:#12121a;
    --glass-border:rgba(200,230,255,0.25);
    --accent:#00d4ff;--accent2:#ff3cac;
    --gold:#ffd700;--text:#e0eaff;
    --muted:rgba(200,220,255,0.4);
  }
  *{margin:0;padding:0;box-sizing:border-box;touch-action:none;}
  body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;min-height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;user-select:none;}
  .bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:40px 40px;animation:gridDrift 20s linear infinite;}
  @keyframes gridDrift{from{background-position:0 0}to{background-position:40px 40px}}
  .scanline{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);}
  header{position:relative;z-index:10;width:100%;text-align:center;padding:18px 20px 0;display:flex;align-items:center;justify-content:center;}
  .title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,10vw,4.5rem);letter-spacing:.12em;color:var(--accent);text-shadow:0 0 30px rgba(0,212,255,.6),0 0 60px rgba(0,212,255,.3);line-height:1;}
  .subtitle{font-size:.65rem;letter-spacing:.35em;color:var(--muted);text-transform:uppercase;margin-top:4px;}
  .gear-btn{position:absolute;right:18px;top:50%;transform:translateY(-50%);background:none;border:1px solid var(--glass-border);border-radius:8px;color:var(--muted);cursor:pointer;padding:8px 10px;font-size:1.1rem;transition:all .2s;z-index:11;}
  .gear-btn:hover{color:var(--accent);border-color:var(--accent);box-shadow:0 0 12px rgba(0,212,255,.3);}

  /* Settings panel */
  #settingsPanel{display:none;position:fixed;inset:0;z-index:500;background:rgba(5,5,15,.95);backdrop-filter:blur(10px);flex-direction:column;align-items:center;justify-content:center;overflow-y:auto;}
  #settingsPanel.active{display:flex;}
  .settings-card{background:var(--surface);border:1px solid var(--glass-border);border-radius:14px;padding:32px 32px 28px;width:min(90vw,400px);position:relative;margin:20px 0;}
  .settings-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.15em;color:var(--accent);margin-bottom:20px;}
  .settings-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;transition:color .2s;}
  .settings-close:hover{color:var(--text);}
  .settings-section{margin-bottom:20px;}
  .settings-label{font-size:.62rem;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;display:block;}
  .upload-zone{border:1.5px dashed rgba(0,212,255,.3);border-radius:8px;padding:18px;text-align:center;cursor:pointer;transition:all .2s;font-size:.75rem;color:var(--muted);}
  .upload-zone:hover{border-color:var(--accent);color:var(--text);}
  .upload-zone input{display:none;}
  .video-name{font-size:.7rem;color:var(--accent);margin-top:6px;word-break:break-all;}
  .slider-row{display:flex;align-items:center;gap:10px;margin-top:6px;}
  .slider-row label{font-size:.65rem;color:var(--muted);min-width:60px;}
  .slider-row input[type=range]{flex:1;accent-color:var(--accent);}
  .slider-row .sval{font-size:.65rem;color:var(--accent);min-width:36px;text-align:right;}
  .blend-select{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--glass-border);border-radius:6px;color:var(--text);font-family:'Space Mono',monospace;font-size:.75rem;padding:8px 10px;outline:none;cursor:pointer;}
  .blend-select option{background:#12121a;}
  .clear-video-btn{margin-top:8px;font-size:.65rem;color:var(--accent2);background:none;border:none;cursor:pointer;text-decoration:underline;font-family:'Space Mono',monospace;}

  .energy-row{position:relative;z-index:10;width:100%;max-width:380px;padding:10px 24px 0;display:flex;align-items:center;gap:10px;}
  .energy-label{font-size:.6rem;letter-spacing:.25em;color:var(--muted);text-transform:uppercase;white-space:nowrap;}
  .energy-track{flex:1;height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;border:1px solid rgba(255,255,255,.1);}
  .energy-fill{height:100%;width:0%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .1s ease;box-shadow:0 0 8px var(--accent);}
  .energy-val{font-size:.65rem;font-weight:700;color:var(--accent);min-width:36px;text-align:right;}
  .game-area{position:relative;z-index:10;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding:10px 0 0;}
  .jar-wrapper{position:relative;display:flex;align-items:center;justify-content:center;cursor:grab;}
  .jar-wrapper:active{cursor:grabbing;}
  .jar-svg{width:min(220px,55vw);transition:filter .2s;}
  @keyframes jarShake{0%,100%{transform:rotate(0) translateX(0)}15%{transform:rotate(-4deg) translateX(-6px)}30%{transform:rotate(5deg) translateX(7px)}45%{transform:rotate(-3deg) translateX(-5px)}60%{transform:rotate(4deg) translateX(6px)}75%{transform:rotate(-2deg) translateX(-4px)}90%{transform:rotate(2deg) translateX(3px)}}
  .jar-wrapper.shaking{animation:jarShake .35s ease-in-out;}
  .come-btn{margin-top:28px;font-family:'Bebas Neue',sans-serif;font-size:clamp(1.6rem,7vw,2.4rem);letter-spacing:.2em;padding:14px 50px;border:2px solid currentColor;border-radius:4px;background:transparent;color:rgba(255,255,255,.15);cursor:not-allowed;outline:none;transition:all .3s ease;}
  .come-btn.ready{color:var(--accent2);border-color:var(--accent2);cursor:pointer;box-shadow:0 0 20px rgba(255,60,172,.4),inset 0 0 20px rgba(255,60,172,.1);animation:pulseBtn 1s ease-in-out infinite;}
  .come-btn.ready:hover{background:rgba(255,60,172,.15);box-shadow:0 0 40px rgba(255,60,172,.6);transform:scale(1.04);}
  @keyframes pulseBtn{0%,100%{box-shadow:0 0 20px rgba(255,60,172,.4),inset 0 0 20px rgba(255,60,172,.1)}50%{box-shadow:0 0 35px rgba(255,60,172,.7),inset 0 0 35px rgba(255,60,172,.2)}}
  .hint{margin-top:12px;font-size:.58rem;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;}
  .score-row{position:relative;z-index:10;width:100%;max-width:380px;display:flex;justify-content:space-between;align-items:center;padding:8px 24px 16px;font-size:.7rem;letter-spacing:.12em;color:var(--muted);}
  .score-val{color:var(--text);font-weight:700;font-size:.8rem;}

  /* BURST STAGE */
  #burstStage{display:none;position:fixed;inset:0;z-index:200;background:#050508;}
  #burstStage.active{display:block;}
  #burstCanvas{position:absolute;inset:0;width:100%;height:100%;}
  #burstVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;pointer-events:none;}

  /* TAROT STAGE */
  #tarotStage{display:none;position:fixed;inset:0;z-index:300;background:rgba(4,3,12,.96);backdrop-filter:blur(6px);flex-direction:column;align-items:center;justify-content:center;gap:0;}
  #tarotStage.active{display:flex;}

  /* Tarot card 3D flip */
  .tarot-scene{perspective:900px;width:min(260px,70vw);height:min(450px,72vh);margin-bottom:18px;}
  .tarot-card-3d{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 1s cubic-bezier(.4,0,.2,1);transform:rotateY(180deg);}
  .tarot-card-3d.flipped{transform:rotateY(0deg);}
  .tarot-face,.tarot-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;overflow:hidden;}
  /* Back of card */
  .tarot-back{transform:rotateY(180deg);background:#0e0820;border:2px solid rgba(180,130,255,.4);display:flex;align-items:center;justify-content:center;}
  .tarot-back-pattern{width:88%;height:88%;border:1px solid rgba(180,130,255,.25);border-radius:8px;display:flex;align-items:center;justify-content:center;background:repeating-linear-gradient(45deg,rgba(120,60,220,.06) 0,rgba(120,60,220,.06) 2px,transparent 2px,transparent 14px);}
  .tarot-back-star{font-size:2.5rem;opacity:.4;}
  /* Front of card - drawn on canvas */
  .tarot-face{background:#0e0820;}
  #tarotCanvas{width:100%;height:100%;display:block;}

  /* Name form below card */
  .tarot-form{display:flex;flex-direction:column;align-items:center;gap:10px;width:min(280px,80vw);animation:fadeUp .6s .8s both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .tarot-name-input{width:100%;padding:9px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(180,130,255,.3);border-radius:6px;color:var(--text);font-family:'Space Mono',monospace;font-size:.82rem;text-align:center;outline:none;transition:border .2s;}
  .tarot-name-input:focus{border-color:rgba(180,130,255,.8);}
  .tarot-save-btn{width:100%;padding:11px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;border-radius:6px;font-family:'Bebas Neue',sans-serif;font-size:1.35rem;letter-spacing:.2em;color:#fff;cursor:pointer;transition:transform .15s,box-shadow .15s;}
  .tarot-save-btn:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(124,58,237,.6);}
  .tarot-skip-row{display:flex;align-items:center;gap:14px;width:100%;}
  .tarot-skip-btn{flex:1;padding:9px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;font-family:'Space Mono',monospace;font-size:.7rem;color:var(--muted);cursor:pointer;transition:all .2s;}
  .tarot-skip-btn:hover{border-color:var(--accent2);color:var(--accent2);}
  .tarot-dl-btn{padding:9px 12px;background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);border-radius:6px;font-size:.7rem;color:var(--gold);cursor:pointer;font-family:'Space Mono',monospace;transition:all .2s;white-space:nowrap;}
  .tarot-dl-btn:hover{background:rgba(255,215,0,.15);}

  .leaderboard{position:relative;z-index:10;width:100%;max-width:380px;padding:0 24px 20px;}
  .lb-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.2em;color:var(--muted);margin-bottom:8px;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:6px;}
  .lb-row{display:flex;justify-content:space-between;padding:5px 0;font-size:.7rem;border-bottom:1px solid rgba(255,255,255,.04);color:var(--muted);}
  .lb-row.top{color:var(--gold);}
  .lb-rank{min-width:24px;font-weight:700;}
  .lb-name{flex:1;padding:0 8px;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;}
  .lb-score-val{color:var(--accent);font-weight:700;}
  .lb-empty{font-size:.65rem;color:rgba(255,255,255,.15);text-align:center;padding:10px 0;letter-spacing:.2em;}
  .stroke-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:120px;border:1px dashed rgba(0,212,255,.2);border-radius:20px;pointer-events:none;opacity:0;transition:opacity .5s;}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="scanline"></div>

<header>
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div class="title">LỌ</div>
    <div class="subtitle">tích cực quay tay · vận may sẽ tới</div>
  </div>
  <button class="gear-btn" id="gearBtn" title="Customize burst animation">⚙</button>
</header>

<!-- Settings Panel -->
<div id="settingsPanel">
  <div class="settings-card">
    <button class="settings-close" id="settingsClose">✕</button>
    <div class="settings-title">BURST SETTINGS</div>
    <div class="settings-section">
      <span class="settings-label">Video Overlay — plays once, synced to burst duration</span>
      <label class="upload-zone">
        <input type="file" id="videoUpload" accept="video/*">
        <span id="uploadLabel">📹 Tap to upload a video</span>
        <div class="video-name" id="videoFileName"></div>
      </label>
      <button class="clear-video-btn" id="clearVideoBtn" style="display:none;">✕ Remove video</button>
    </div>
    <div class="settings-section" id="videoControls" style="display:none;">
      <span class="settings-label">Blend Mode</span>
      <select class="blend-select" id="blendSelect">
        <option value="normal">Normal</option>
        <option value="screen" selected>Screen</option>
        <option value="overlay">Overlay</option>
        <option value="hard-light">Hard Light</option>
        <option value="soft-light">Soft Light</option>
        <option value="lighten">Lighten</option>
        <option value="color-dodge">Color Dodge</option>
        <option value="luminosity">Luminosity</option>
        <option value="multiply">Multiply</option>
      </select>
      <div class="slider-row" style="margin-top:12px;"><label>Opacity</label><input type="range" id="opacitySlider" min="5" max="100" value="80"><span class="sval" id="opacityVal">80%</span></div>
      <div class="slider-row"><label>Scale</label><input type="range" id="scaleSlider" min="50" max="200" value="100"><span class="sval" id="scaleVal">100%</span></div>
    </div>
    <div class="settings-section">
      <span class="settings-label">Burst Duration</span>
      <div class="slider-row"><label>Duration</label><input type="range" id="durationSlider" min="1500" max="6000" value="3400" step="100"><span class="sval" id="durationVal">3.4s</span></div>
    </div>
    <div class="settings-section">
      <span class="settings-label">Foam Intensity</span>
      <div class="slider-row"><label>Jets</label><input type="range" id="jetsSlider" min="40" max="300" value="150" step="10"><span class="sval" id="jetsVal">150</span></div>
      <div class="slider-row"><label>Drips</label><input type="range" id="dripsSlider" min="8" max="60" value="30"><span class="sval" id="dripsVal">30</span></div>
    </div>
    <div class="settings-section">
      <span class="settings-label">Energy Decay Rate</span>
      <div class="slider-row"><label>Speed</label><input type="range" id="decaySlider" min="1" max="20" value="6" step="1"><span class="sval" id="decayVal">×6</span></div>
    </div>
  </div>
</div>

<div class="energy-row">
  <span class="energy-label">Energy</span>
  <div class="energy-track"><div class="energy-fill" id="energyFill"></div></div>
  <span class="energy-val" id="energyVal">0%</span>
</div>

<div class="game-area">
  <div class="jar-wrapper" id="jarWrapper">
    <div class="stroke-hint" id="strokeHint"></div>
    <svg class="jar-svg" id="jarSvg" viewBox="0 0 160 220" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="jarClip"><path d="M 30 55 Q 28 65 22 80 L 18 190 Q 18 210 80 210 Q 142 210 142 190 L 138 80 Q 132 65 130 55 Z"/></clipPath>
        <linearGradient id="glassGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="rgba(200,230,255,0.18)"/>
          <stop offset="30%" stop-color="rgba(200,230,255,0.06)"/>
          <stop offset="70%" stop-color="rgba(200,230,255,0.04)"/>
          <stop offset="100%" stop-color="rgba(200,230,255,0.16)"/>
        </linearGradient>
        <linearGradient id="liquidGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(220,242,255,0.75)"/>
          <stop offset="100%" stop-color="rgba(180,220,255,0.45)"/>
        </linearGradient>
        <radialGradient id="foamGrad" cx="50%" cy="30%" r="70%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/>
          <stop offset="100%" stop-color="rgba(220,240,255,0.7)"/>
        </radialGradient>
      </defs>
      <rect x="34" y="38" width="92" height="20" rx="4" fill="rgba(160,200,230,0.3)" stroke="rgba(200,230,255,0.4)" stroke-width="1.2"/>
      <rect x="42" y="34" width="76" height="8" rx="3" fill="rgba(160,200,230,0.25)" stroke="rgba(200,230,255,0.35)" stroke-width="1"/>
      <path d="M 30 55 Q 28 65 22 80 L 18 190 Q 18 210 80 210 Q 142 210 142 190 L 138 80 Q 132 65 130 55 Z" fill="url(#glassGrad)" stroke="rgba(200,230,255,0.35)" stroke-width="1.5"/>
      <g clip-path="url(#jarClip)">
        <rect id="liquidRect" x="0" y="90" width="160" height="130" fill="url(#liquidGrad)"/>
        <ellipse id="foamEllipse" cx="80" cy="90" rx="58" ry="10" fill="url(#foamGrad)" opacity="0.7"/>
        <g id="svgBubbles"></g>
        <g id="pressureLines" opacity="0"></g>
      </g>
      <path d="M 36 65 Q 34 100 34 140" stroke="rgba(255,255,255,0.35)" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M 42 60 Q 40 95 41 130" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M 124 65 Q 126 100 126 140" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>
  </div>
  <button class="come-btn" id="comeBtn" disabled>COME</button>
  <div class="hint" id="hintText">shake or stroke the jar to charge</div>
</div>

<div class="score-row">
  <span>SESSION <span class="score-val" id="sessionScore">0</span></span>
  <span>BEST <span class="score-val" id="bestScore">–</span></span>
</div>

<div class="leaderboard">
  <div class="lb-title">⚡ LEADERBOARD</div>
  <div id="lbRows"><div class="lb-empty">NO SCORES YET</div></div>
</div>

<!-- Burst stage -->
<div id="burstStage">
  <canvas id="burstCanvas"></canvas>
  <video id="burstVideo" muted playsinline></video>
</div>

<!-- Tarot stage -->
<div id="tarotStage">
  <div class="tarot-scene">
    <div class="tarot-card-3d" id="tarotCard3d">
      <!-- Back -->
      <div class="tarot-back">
        <div class="tarot-back-pattern"><span class="tarot-back-star">✦</span></div>
      </div>
      <!-- Front -->
      <div class="tarot-face">
        <canvas id="tarotCanvas"></canvas>
      </div>
    </div>
  </div>
  <div class="tarot-form">
    <input class="tarot-name-input" id="tarotNameInput" type="text" placeholder="Your name on the card..." maxlength="22" autocomplete="off"/>
    <button class="tarot-save-btn" id="tarotSaveBtn">CLAIM YOUR CARD</button>
    <div class="tarot-skip-row">
      <button class="tarot-skip-btn" id="tarotSkipBtn">✕ Skip</button>
      <button class="tarot-dl-btn" id="tarotDlBtn">⬇ Save Card</button>
    </div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);

// ============ TAROT DATA ============
const TAROT=[
  {num:'0',name:'THE FOOL',symbol:'☽',desc:'New beginnings, innocence, spontaneity',colors:['#1a0a2e','#4a1f8a','#c084fc'],accent:'#c084fc'},
  {num:'I',name:'THE MAGICIAN',symbol:'☿',desc:'Willpower, skill, manifestation',colors:['#0a1a0a','#1a5c1a','#4ade80'],accent:'#4ade80'},
  {num:'II',name:'HIGH PRIESTESS',symbol:'☽',desc:'Intuition, mystery, the subconscious',colors:['#0a0a2a','#1e3a6e','#93c5fd'],accent:'#93c5fd'},
  {num:'III',name:'THE EMPRESS',symbol:'♀',desc:'Fertility, beauty, nature, abundance',colors:['#1a0a0a','#6b2121','#f87171'],accent:'#fca5a5'},
  {num:'IV',name:'THE EMPEROR',symbol:'♂',desc:'Authority, structure, leadership',colors:['#1a1000','#6b4a00','#fbbf24'],accent:'#fcd34d'},
  {num:'V',name:'THE HIEROPHANT',symbol:'♄',desc:'Tradition, spiritual wisdom, conformity',colors:['#1a0a1a','#5b1a6e','#d946ef'],accent:'#e879f9'},
  {num:'VI',name:'THE LOVERS',symbol:'♡',desc:'Love, harmony, choices, alignment',colors:['#1a0010','#7c0040','#fb7185'],accent:'#fda4af'},
  {num:'VII',name:'THE CHARIOT',symbol:'⚡',desc:'Control, willpower, victory, assertion',colors:['#0a0a1a','#1e2a6e','#60a5fa'],accent:'#7dd3fc'},
  {num:'VIII',name:'STRENGTH',symbol:'∞',desc:'Courage, patience, control, compassion',colors:['#1a0800','#7c3000','#fb923c'],accent:'#fdba74'},
  {num:'IX',name:'THE HERMIT',symbol:'★',desc:'Soul-searching, introspection, guidance',colors:['#0a0a0a','#2a2a2a','#94a3b8'],accent:'#cbd5e1'},
  {num:'X',name:'WHEEL OF FORTUNE',symbol:'⊕',desc:'Cycles, fate, luck, turning points',colors:['#001a1a','#006060','#2dd4bf'],accent:'#5eead4'},
  {num:'XI',name:'JUSTICE',symbol:'⚖',desc:'Fairness, truth, law, cause and effect',colors:['#1a1a00','#5c5c00','#facc15'],accent:'#fde68a'},
  {num:'XII',name:'THE HANGED MAN',symbol:'⁂',desc:'Suspension, sacrifice, surrender',colors:['#00101a','#004060','#38bdf8'],accent:'#7dd3fc'},
  {num:'XIII',name:'DEATH',symbol:'♆',desc:'Endings, transformation, transition',colors:['#0a0a0a','#1a1a1a','#6b7280'],accent:'#9ca3af'},
  {num:'XIV',name:'TEMPERANCE',symbol:'☯',desc:'Balance, moderation, patience, purpose',colors:['#001a0a','#00663a','#34d399'],accent:'#6ee7b7'},

// ============ GAME STATE ============
let energy=0,sessionScore=0,burstScore=0;
const THRESHOLD=70,MAX_E=100;
let shaking=false,lastShakeTime=0;
let isStroking=false,strokeLastY=0,strokeLastTime=0;
let animFrame;
let leaderboard=JSON.parse(localStorage.getItem('shakeJarLB')||'[]');
let currentTarot=null;

const energyFill=$('energyFill'),energyVal=$('energyVal');
const comeBtn=$('comeBtn'),hintText=$('hintText');
const jarWrapper=$('jarWrapper'),jarSvg=$('jarSvg');
const liquidRect=$('liquidRect'),foamEllipse=$('foamEllipse');
const svgBubbles=$('svgBubbles'),pressureLines=$('pressureLines');
const burstStage=$('burstStage'),burstCanvas=$('burstCanvas');
const burstVideo=$('burstVideo');
const tarotStage=$('tarotStage');
const sessionScoreEl=$('sessionScore'),bestScoreEl=$('bestScore');
const lbRows=$('lbRows'),strokeHint=$('strokeHint');

// ============ ENERGY ============
function addEnergy(v){energy=Math.min(MAX_E,energy+v);updateUI();}
// Fast decay: base 0.08 * decayRate multiplier
function decayEnergy(){if(!isStroking&&!shaking)energy=Math.max(0,energy-0.08*cfg.decayRate);updateUI();}
function updateUI(){
  const p=Math.round(energy);
  energyFill.style.width=p+'%';energyVal.textContent=p+'%';
  const ly=210-(energy/100)*130;
  liquidRect.setAttribute('y',ly);foamEllipse.setAttribute('cy',ly);
  foamEllipse.setAttribute('rx',55+energy*0.15);
  foamEllipse.setAttribute('opacity',0.4+(energy/100)*0.55);
  pressureLines.setAttribute('opacity',energy>50?(energy-50)/50*0.6:0);
  const g=energy/100;
  jarSvg.style.filter=`drop-shadow(0 0 ${8+g*30}px rgba(0,212,255,${0.15+g*0.5}))`;
  if(energy>=THRESHOLD){
    comeBtn.disabled=false;comeBtn.classList.add('ready');
    hintText.textContent='⚡ RELEASE THE PRESSURE!';
  }else{
    comeBtn.disabled=true;comeBtn.classList.remove('ready');
    hintText.textContent='shake or stroke the jar to charge';
  }
}

function spawnBubble(){
  if(energy<5||Math.random()>(energy/100)*0.4)return;
  const b=document.createElementNS('http://www.w3.org/2000/svg','circle');
  const ly=210-(energy/100)*130;
  b.setAttribute('cx',22+Math.random()*116);b.setAttribute('cy',200);
  b.setAttribute('r',1.5+Math.random()*3);b.setAttribute('fill','rgba(255,255,255,0.6)');
  svgBubbles.appendChild(b);
  const dur=800+Math.random()*1200,start=performance.now();
  (function ab(now){const p=Math.min(1,(now-start)/dur);b.setAttribute('cy',200-(200-ly-5)*p);b.setAttribute('opacity',1-p);if(p<1)requestAnimationFrame(ab);else b.remove();})(performance.now());
}

function triggerShakeAnim(){
  jarWrapper.classList.remove('shaking');void jarWrapper.offsetWidth;jarWrapper.classList.add('shaking');
  jarWrapper.addEventListener('animationend',()=>jarWrapper.classList.remove('shaking'),{once:true});
}

// Accelerometer
let lastAcc={x:0,y:0,z:0},lastAccTime=0;
function handleMotion(e){
  const acc=e.accelerationIncludingGravity||e.acceleration;if(!acc)return;
  const now=Date.now();if(now-lastAccTime<50)return;lastAccTime=now;
  const total=Math.abs((acc.x||0)-lastAcc.x)+Math.abs((acc.y||0)-lastAcc.y)+Math.abs((acc.z||0)-lastAcc.z);
  lastAcc={x:acc.x||0,y:acc.y||0,z:acc.z||0};
  if(total>8){const gain=Math.min(total/6,4);addEnergy(gain);shaking=true;lastShakeTime=now;triggerShakeAnim();sessionScore+=Math.round(gain*2);sessionScoreEl.textContent=sessionScore;}
}
setInterval(()=>{if(Date.now()-lastShakeTime>500)shaking=false;},200);
if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
  document.addEventListener('click',async()=>{try{const p=await DeviceMotionEvent.requestPermission();if(p==='granted')window.addEventListener('devicemotion',handleMotion);}catch{}},{once:true});
}else window.addEventListener('devicemotion',handleMotion);

// Stroke
function getY(e){return e.touches?e.touches[0].clientY:e.clientY;}
jarWrapper.addEventListener('pointerdown',e=>{
  e.preventDefault();isStroking=true;strokeLastY=getY(e);strokeLastTime=Date.now();
  strokeHint.style.opacity='1';jarWrapper.setPointerCapture(e.pointerId);
});
window.addEventListener('pointermove',e=>{
  if(!isStroking)return;
  const y=getY(e),dy=Math.abs(y-strokeLastY),now=Date.now(),dt=Math.max(1,now-strokeLastTime);
  if(dy>2){const gain=Math.min((dy/dt)*18,3.5);addEnergy(gain);triggerShakeAnim();sessionScore+=Math.round(gain*1.5);sessionScoreEl.textContent=sessionScore;strokeLastY=y;strokeLastTime=now;}
});
window.addEventListener('pointerup',()=>{isStroking=false;strokeHint.style.opacity='0';});
window.addEventListener('pointercancel',()=>{isStroking=false;strokeHint.style.opacity='0';});

function gameLoop(){decayEnergy();spawnBubble();animFrame=requestAnimationFrame(gameLoop);}
gameLoop();

comeBtn.addEventListener('click',()=>{
  if(energy<THRESHOLD)return;
  burstScore=Math.round(energy*10+sessionScore);
  cancelAnimationFrame(animFrame);
  startBurstAnimation();
});

// ============ BURST ANIMATION ============
function startBurstAnimation(){
  burstCanvas.width=window.innerWidth;burstCanvas.height=window.innerHeight;
  if(cfg.videoBlobURL){
    burstVideo.loop=false;
    burstVideo.src=cfg.videoBlobURL;
    burstVideo.style.display='block';
    burstVideo.style.mixBlendMode=cfg.videoBlend;
    burstVideo.style.opacity=cfg.videoOpacity;
    burstVideo.style.transition='opacity 0.5s ease';
    burstVideo.style.transform=`scale(${cfg.videoScale})`;
    burstVideo.currentTime=0;
    // Once metadata loads, set playbackRate so video duration matches burst duration
    const onMeta=()=>{
      if(burstVideo.duration&&isFinite(burstVideo.duration)){
        const rate=burstVideo.duration/(cfg.burstDuration/1000);
        burstVideo.playbackRate=Math.min(Math.max(rate,0.1),16);
      }
      burstVideo.play().catch(()=>{});
    };
    if(burstVideo.readyState>=1)onMeta();
    else burstVideo.addEventListener('loadedmetadata',onMeta,{once:true});
    // Fade out video in the last 500ms of the animation
    setTimeout(()=>{burstVideo.style.opacity='0';},Math.max(0,cfg.burstDuration-500));
    // Hard stop at exactly burst duration
    setTimeout(()=>{burstVideo.pause();burstVideo.style.opacity=cfg.videoOpacity;burstVideo.style.transition='';},cfg.burstDuration);
  }else{burstVideo.style.display='none';burstVideo.pause();}
  burstStage.classList.add('active');

  const W=burstCanvas.width,H=burstCanvas.height,S=Math.min(W,H)/340;
  const JW=130*S,JH=170*S,JX=W/2,JY=H/2-20*S;
  const LID_H=22*S,LID_W=JW*.88;
  const TOTAL=cfg.burstDuration;
  let t0=null;

  const jets=Array.from({length:cfg.jetCount},(_,i)=>{
    const angle=-Math.PI/2+(Math.random()-.5)*1.2,spd=(4+Math.random()*18)*S;
    return{x:JX+(Math.random()-.5)*LID_W*.5,y:JY-JH/2,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,r:(1+Math.random()*8)*S,alpha:.8+Math.random()*.2,decay:.004+Math.random()*.009,gravity:.2*S,wobble:Math.random()*Math.PI*2,wobbleFreq:.08+Math.random()*.12,wobbleAmp:(.3+Math.random()*.8)*S,delay:Math.random()*.2,layer:i%3};
  });
  const drips=Array.from({length:cfg.dripCount},()=>{
    const side=Math.random()<.5?-1:1,ef=.15+Math.random()*.78;
    return{x:JX+side*(JW/2)*ef,topY:JY-JH/2+Math.random()*8*S,segW:(2+Math.random()*6)*S,maxLen:(35+Math.random()*100)*S,alpha:.6+Math.random()*.4,blobR:(5+Math.random()*9)*S,delay:.10+Math.random()*.35,currentLen:0,phase:Math.random()*Math.PI*2,wobbleAmp:(1+Math.random()*2)*S,wobbleFreq:3+Math.random()*4};
  });
  const colBubbles=Array.from({length:80},()=>({x:JX+(Math.random()-.5)*JW*.3,y:JY-JH/2,vy:-(6+Math.random()*14)*S,vx:(Math.random()-.5)*3*S,r:(3+Math.random()*12)*S,alpha:.6+Math.random()*.35,decay:.003+Math.random()*.006,gravity:.1*S,delay:Math.random()*.12}));
  const splashRings=[];
  const lidAv=(Math.random()-.5)*.4;

  function drawJar(liqFrac,sx,sy){
    const cx=JX+sx,top=JY-JH/2+sy,bot=JY+JH/2+sy;
    bctx.save();bctx.beginPath();
    bctx.moveTo(cx-JW*.5,top);bctx.quadraticCurveTo(cx-JW*.56,top+JH*.12,cx-JW*.58,bot);
    bctx.quadraticCurveTo(cx-JW*.58,bot+10*S,cx,bot+10*S);bctx.quadraticCurveTo(cx+JW*.58,bot+10*S,cx+JW*.58,bot);
    bctx.quadraticCurveTo(cx+JW*.56,top+JH*.12,cx+JW*.5,top);bctx.closePath();
    const gf=bctx.createLinearGradient(cx-JW*.58,0,cx+JW*.58,0);
    gf.addColorStop(0,'rgba(180,220,255,.22)');gf.addColorStop(.28,'rgba(180,220,255,.07)');gf.addColorStop(.72,'rgba(180,220,255,.05)');gf.addColorStop(1,'rgba(180,220,255,.22)');
    bctx.fillStyle=gf;bctx.fill();bctx.strokeStyle='rgba(200,230,255,.45)';bctx.lineWidth=1.5;bctx.stroke();
    bctx.clip();
    if(liqFrac>.01){const lt=top+JH*(1-liqFrac)*.95;const lf=bctx.createLinearGradient(0,lt,0,bot);lf.addColorStop(0,'rgba(225,245,255,.85)');lf.addColorStop(1,'rgba(180,220,255,.5)');bctx.fillStyle=lf;bctx.fillRect(cx-JW,lt,JW*2,bot-lt+12*S);bctx.beginPath();bctx.ellipse(cx,lt,JW*.46,JH*.04,0,0,Math.PI*2);bctx.fillStyle='rgba(255,255,255,.85)';bctx.fill();}
    bctx.restore();
    bctx.save();bctx.beginPath();bctx.moveTo(cx-JW*.33,top+JH*.05);bctx.quadraticCurveTo(cx-JW*.37,top+JH*.5,cx-JW*.35,top+JH*.82);bctx.strokeStyle='rgba(255,255,255,.28)';bctx.lineWidth=3*S;bctx.lineCap='round';bctx.stroke();bctx.restore();
  }
  function drawLid(ly,angle,alpha){
    if(alpha<=0)return;bctx.save();bctx.globalAlpha=alpha;bctx.translate(JX,ly+LID_H/2);bctx.rotate(angle);
    bctx.beginPath();bctx.roundRect(-LID_W/2,-LID_H/2,LID_W,LID_H,4*S);bctx.fillStyle='rgba(155,200,230,.52)';bctx.fill();bctx.strokeStyle='rgba(200,235,255,.55)';bctx.lineWidth=1.5;bctx.stroke();
    bctx.beginPath();bctx.roundRect(-LID_W*.44,-LID_H/2-LID_H*.38,LID_W*.88,LID_H*.4,3*S);bctx.fillStyle='rgba(145,195,225,.42)';bctx.fill();bctx.restore();
  }
  function drawFlash(a){
    if(a<=0)return;
    bctx.save();bctx.globalAlpha=a*.55;bctx.fillStyle='rgba(255,60,60,1)';bctx.fillRect(-4,0,W+8,H);bctx.restore();
    bctx.save();bctx.globalAlpha=a*.45;bctx.fillStyle='rgba(60,200,255,1)';bctx.fillRect(4,0,W-8,H);bctx.restore();
    bctx.save();bctx.globalAlpha=a*.7;bctx.fillStyle='rgba(255,255,255,1)';bctx.fillRect(0,0,W,H);bctx.restore();
  }
  function resolveJet(j,bp){
    const steps=Math.floor(bp*80);let px=j.x,py=j.y,pvx=j.vx,pvy=j.vy,a=j.alpha;
    for(let s=0;s<steps;s++){pvy+=j.gravity;pvx+=Math.sin(j.wobble+s*j.wobbleFreq)*j.wobbleAmp*.01;px+=pvx;py+=pvy;a-=j.decay;if(a<=0)break;}
    return{px,py,r:j.r,a};
  }
  function resolveCol(b,bp){
    const steps=Math.floor(bp*70);let px=b.x,py=b.y,pvx=b.vx,pvy=b.vy,a=b.alpha;
    for(let s=0;s<steps;s++){pvy+=b.gravity;px+=pvx;py+=pvy;a-=b.decay;if(a<=0)break;}
    return{px,py,r:b.r,a};
  }

  let burstRaf,lastFT=0;
  function frame(ts){
    if(!t0)t0=ts;const t=Math.min((ts-t0)/TOTAL,1);const dt=(ts-lastFT)/16;lastFT=ts;
    bctx.clearRect(0,0,W,H);
    bctx.save();const pulse=.02+Math.abs(Math.sin(t*Math.PI*12))*.04*(1-t);const rg=bctx.createRadialGradient(JX,JY,0,JX,JY,W*.6);rg.addColorStop(0,`rgba(0,190,255,${pulse})`);rg.addColorStop(1,'rgba(0,0,0,0)');bctx.fillStyle=rg;bctx.fillRect(0,0,W,H);bctx.restore();

    if(t<.18){
      const vt=t/.18,amp=16*S*(.3+vt*.7),sx=Math.sin(vt*90)*amp,sy=Math.cos(vt*68)*amp*.35;
      drawJar(1,sx,sy);drawLid(JY-JH/2-LID_H+sy*.5,Math.sin(vt*90)*.1,1);
      if(vt>.6){for(let i=0;i<Math.ceil(vt*7);i++){bctx.save();bctx.globalAlpha=.35*Math.random();bctx.beginPath();bctx.arc(JX+(Math.random()-.5)*LID_W,JY-JH/2-LID_H-(Math.random()*22*S),(.8+Math.random()*3)*S,0,Math.PI*2);bctx.fillStyle='rgba(255,255,255,.9)';bctx.fill();bctx.restore();}}
    }else if(t<.28){
      const pt=(t-.18)/.10,sx=Math.sin(pt*40)*4*S*(1-pt);
      drawJar(Math.max(.05,1-pt*.25),sx,0);
      drawLid(JY-JH/2-LID_H-(pt*pt)*260*S,lidAv*pt*22,Math.max(0,1-pt*1.8));
      drawFlash(Math.max(0,(.2-pt)/.2)*.8);
      if(pt>.15){const bp=(pt-.15)/.85;for(const j of jets){if(j.delay>.04)continue;const{px,py,r,a}=resolveJet(j,bp*.18);if(a<=0)continue;bctx.save();bctx.globalAlpha=a;bctx.beginPath();bctx.arc(px,py,r,0,Math.PI*2);bctx.fillStyle='rgba(255,255,255,.92)';bctx.fill();bctx.restore();}}
    }else{
      const bp=(t-.28)/.72;
      drawJar(Math.max(.01,.72*(1-bp*1.15)),0,0);
      const poolY=H-20*S,poolR=Math.min(bp*1.3,1)*JW*1.8,poolA=Math.min(bp*2,.45);
      if(poolR>2){bctx.save();bctx.globalAlpha=poolA;const pg=bctx.createRadialGradient(JX,poolY,0,JX,poolY,poolR);pg.addColorStop(0,'rgba(255,255,255,.6)');pg.addColorStop(.5,'rgba(220,245,255,.35)');pg.addColorStop(1,'rgba(200,235,255,0)');bctx.fillStyle=pg;bctx.beginPath();bctx.ellipse(JX,poolY,poolR,poolR*.18,0,0,Math.PI*2);bctx.fill();bctx.restore();}
      if(bp<.6&&Math.random()<.06*dt)splashRings.push({x:JX+(Math.random()-.5)*poolR*.7,y:poolY,r:2*S,maxR:(15+Math.random()*40)*S,alpha:.5,speed:(.8+Math.random()*.8)*S});
      for(let i=splashRings.length-1;i>=0;i--){const ring=splashRings[i];ring.r+=ring.speed*dt;ring.alpha-=.012*dt;if(ring.alpha<=0){splashRings.splice(i,1);continue;}bctx.save();bctx.globalAlpha=ring.alpha;bctx.beginPath();bctx.ellipse(ring.x,ring.y,ring.r,ring.r*.2,0,0,Math.PI*2);bctx.strokeStyle='rgba(220,245,255,.9)';bctx.lineWidth=1.2;bctx.stroke();bctx.restore();}
      for(const cb of colBubbles){const rp=Math.max(0,(bp-cb.delay)/(1-cb.delay));if(rp<=0)continue;const{px,py,r,a}=resolveCol(cb,rp*1.15);if(a<=0)continue;bctx.save();bctx.globalAlpha=a*.5;bctx.beginPath();bctx.arc(px,py,r,0,Math.PI*2);bctx.fillStyle='rgba(255,255,255,.7)';bctx.fill();bctx.restore();}
      for(let layer=0;layer<3;layer++){for(const j of jets){if(j.layer!==layer)continue;const rp=Math.max(0,(bp-j.delay)/(1-j.delay));if(rp<=0)continue;const{px,py,r,a}=resolveJet(j,rp*1.1);if(a<=0)continue;const ds=.65+layer*.18;bctx.save();bctx.globalAlpha=a*(.6+layer*.15);bctx.beginPath();bctx.arc(px,py,r*ds,0,Math.PI*2);bctx.fillStyle=`rgba(240,248,${200+layer*20},.95)`;bctx.fill();bctx.restore();}}
      for(const d of drips){const rp=Math.max(0,(bp-d.delay)/(1-d.delay));if(rp<=0)continue;const tl=d.maxLen*Math.min(rp*1.6,1);d.currentLen+=(tl-d.currentLen)*.1;const len=d.currentLen;if(len<1)continue;const tipY=d.topY+len;bctx.save();bctx.globalAlpha=d.alpha*Math.min(rp*6,1);const segs=Math.max(6,Math.floor(len/(4*S))),segH=len/segs;const dg=bctx.createLinearGradient(0,d.topY,0,tipY);dg.addColorStop(0,'rgba(255,255,255,.97)');dg.addColorStop(.5,'rgba(240,250,255,.85)');dg.addColorStop(1,'rgba(215,242,255,.6)');const hw=d.segW/2;bctx.beginPath();for(let s=0;s<=segs;s++){const sy=d.topY+s*segH,pr=s/segs,wb=Math.sin(d.phase+s*d.wobbleFreq)*d.wobbleAmp*(1-pr*.5),tf=1-pr*.45,lx=d.x-(hw*tf)+wb;if(s===0)bctx.moveTo(lx,sy);else bctx.lineTo(lx,sy);}for(let s=segs;s>=0;s--){const sy=d.topY+s*segH,pr=s/segs,wb=Math.sin(d.phase+s*d.wobbleFreq)*d.wobbleAmp*(1-pr*.5),tf=1-pr*.45,rx=d.x+(hw*tf)+wb;bctx.lineTo(rx,sy);}bctx.closePath();bctx.fillStyle=dg;bctx.fill();const bg=Math.min((len/d.maxLen)*2.2,1),br=d.blobR*bg;if(br>1.5){bctx.beginPath();bctx.ellipse(d.x,tipY+br*.6,d.segW*.55+br*.55,br*.85,0,0,Math.PI*2);bctx.fillStyle='rgba(240,252,255,.92)';bctx.fill();}bctx.restore();}
    }
    if(t<1)burstRaf=requestAnimationFrame(frame);
    else setTimeout(showTarot,300);
  }
  burstRaf=requestAnimationFrame(frame);
}

// ============ TAROT CARD ============
function showTarot(){
  burstStage.classList.remove('active');
  burstVideo.pause();
  currentTarot=TAROT[Math.floor(Math.random()*TAROT.length)];

  // Render card back first (card starts face-down, then flips)
  const tarotCard3d=$('tarotCard3d');
  tarotCard3d.classList.remove('flipped');

  tarotStage.classList.add('active');
  $('tarotNameInput').value='';

  // Draw card face now (hidden on back side until flip)
  drawTarotCard('');

  // Flip after brief pause
  setTimeout(()=>{tarotCard3d.classList.add('flipped');},600);
  setTimeout(()=>$('tarotNameInput').focus(),1400);
}

function drawTarotCard(name){
  const canvas=$('tarotCanvas');
  const card=currentTarot;
  if(!card)return;

  // Size canvas to match display size
  const rect=canvas.getBoundingClientRect();
  const W=Math.max(rect.width||260,1)*2; // 2x for sharpness
  const H=Math.max(rect.height||450,1)*2;
  canvas.width=W; canvas.height=H;
  const c=canvas.getContext('2d');
  const sc=W/260; // scale factor

  // Background gradient
  const bg=c.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,card.colors[0]);
  bg.addColorStop(.5,card.colors[1]);
  bg.addColorStop(1,card.colors[0]);
  c.fillStyle=bg; c.fillRect(0,0,W,H);

  // Outer border
  const bpad=10*sc;
  c.strokeStyle=card.accent; c.lineWidth=2*sc;
  c.strokeRect(bpad,bpad,W-bpad*2,H-bpad*2);

  // Inner border (double line)
  const ipad=16*sc;
  c.strokeStyle=card.accent+'66'; c.lineWidth=1*sc;
  c.strokeRect(ipad,ipad,W-ipad*2,H-ipad*2);

  // Corner ornaments
  const corners=[[ipad,ipad],[W-ipad,ipad],[ipad,H-ipad],[W-ipad,H-ipad]];
  corners.forEach(([cx,cy])=>{
    c.save();c.translate(cx,cy);
    c.fillStyle=card.accent;c.font=`${11*sc}px serif`;c.textAlign='center';c.textBaseline='middle';
    c.fillText('✦',0,0);c.restore();
  });

  // Roman numeral top center
  c.font=`bold ${13*sc}px 'Cinzel', serif`;
  c.fillStyle=card.accent;c.textAlign='center';c.textBaseline='top';
  c.fillText(card.num,W/2,22*sc);

  // Decorative separator line under numeral
  const sepY=38*sc;
  c.strokeStyle=card.accent+'55';c.lineWidth=1*sc;
  c.beginPath();c.moveTo(W*.25,sepY);c.lineTo(W*.75,sepY);c.stroke();

  // Main symbol — large, central
  const symY=H*.32;
  c.save();
  c.textAlign='center';c.textBaseline='middle';
  // Glow effect via shadow
  c.shadowColor=card.accent;c.shadowBlur=22*sc;
  c.font=`${64*sc}px serif`;
  c.fillStyle=card.accent;
  c.fillText(card.symbol,W/2,symY);
  c.shadowBlur=0;c.restore();

  // Decorative circle around symbol
  c.strokeStyle=card.accent+'44';c.lineWidth=1.5*sc;
  c.beginPath();c.arc(W/2,symY,44*sc,0,Math.PI*2);c.stroke();
  // Outer ring
  c.strokeStyle=card.accent+'22';c.lineWidth=1*sc;
  c.beginPath();c.arc(W/2,symY,52*sc,0,Math.PI*2);c.stroke();

  // Decorative tick marks on circles
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4,r1=52*sc,r2=56*sc;
    c.strokeStyle=card.accent+'66';c.lineWidth=1.5*sc;
    c.beginPath();c.moveTo(W/2+Math.cos(a)*r1,symY+Math.sin(a)*r1);c.lineTo(W/2+Math.cos(a)*r2,symY+Math.sin(a)*r2);c.stroke();
  }

  // Card name
  const nameY=H*.55;
  c.font=`bold ${15*sc}px 'Cinzel', serif`;
  c.fillStyle='#ffffff';c.textAlign='center';c.textBaseline='middle';
  c.shadowColor=card.accent;c.shadowBlur=8*sc;
  c.fillText(card.name,W/2,nameY);
  c.shadowBlur=0;

  // Thin line under card name
  const nl=nameY+10*sc;
  c.strokeStyle=card.accent+'44';c.lineWidth=1*sc;
  c.beginPath();c.moveTo(W*.2,nl);c.lineTo(W*.8,nl);c.stroke();

  // Description (small, wrapped)
  c.font=`${8.5*sc}px 'Space Mono', monospace`;
  c.fillStyle=card.accent+'cc';c.textAlign='center';c.textBaseline='top';
  wrapText(c,card.desc,W/2,nl+8*sc,W*.7,12*sc);

  // ---- Score band ----
  const bandY=H*.72;
  const bandH=32*sc;
  // Semi-transparent dark band
  c.fillStyle='rgba(0,0,0,0.45)';
  c.fillRect(ipad,bandY,W-ipad*2,bandH);
  c.strokeStyle=card.accent+'55';c.lineWidth=1*sc;
  c.strokeRect(ipad,bandY,W-ipad*2,bandH);

  // Score label
  c.font=`${7.5*sc}px 'Space Mono', monospace`;
  c.fillStyle=card.accent+'aa';c.textAlign='left';c.textBaseline='middle';
  c.fillText('SCORE',ipad+8*sc,bandY+bandH*.4);

  // Score value
  c.font=`bold ${15*sc}px 'Bebas Neue', sans-serif`;
  c.fillStyle='#ffd700';c.textAlign='left';
  c.fillText(burstScore.toLocaleString(),ipad+8*sc,bandY+bandH*.75);

  // Name label + value (right side)
  if(name){
    c.font=`${7.5*sc}px 'Space Mono', monospace`;
    c.fillStyle=card.accent+'aa';c.textAlign='right';c.textBaseline='middle';
    c.fillText('PLAYER',W-ipad-8*sc,bandY+bandH*.4);

    c.font=`bold ${11*sc}px 'Space Mono', monospace`;
    c.fillStyle='#ffffff';c.textAlign='right';c.textBaseline='middle';
    // Truncate long names
    let displayName=name;
    while(c.measureText(displayName).width>(W*.35)&&displayName.length>1)displayName=displayName.slice(0,-1)+'…';
    c.fillText(displayName,W-ipad-8*sc,bandY+bandH*.75);
  }else{
    c.font=`${7.5*sc}px 'Space Mono', monospace`;
    c.fillStyle=card.accent+'55';c.textAlign='right';c.textBaseline='middle';
    c.fillText('enter name →',W-ipad-8*sc,bandY+bandH*.5);
  }

  // Bottom separator
  const botSepY=H*.72-6*sc;
  c.strokeStyle=card.accent+'33';c.lineWidth=1*sc;
  c.beginPath();c.moveTo(W*.2,botSepY);c.lineTo(W*.8,botSepY);c.stroke();

  // Tiny "SHAKE IT" watermark at very bottom
  c.font=`${7*sc}px 'Space Mono', monospace`;
  c.fillStyle=card.accent+'44';c.textAlign='center';c.textBaseline='bottom';
  c.fillText('LỌ',W/2,H-10*sc);
}

function wrapText(ctx,text,x,y,maxW,lineH){
  const words=text.split(' ');let line='';let cy=y;
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxW&&n>0){ctx.fillText(line,x,cy);line=words[n]+' ';cy+=lineH;}
    else line=test;
  }
  ctx.fillText(line,x,cy);
}

// Live update card as user types name
$('tarotNameInput').addEventListener('input',e=>{drawTarotCard(e.target.value);});

$('tarotSaveBtn').addEventListener('click',()=>{
  const name=$('tarotNameInput').value.trim()||'Anonymous';
  drawTarotCard(name); // Final render with name
  leaderboard.push({name,score:burstScore});
  leaderboard.sort((a,b)=>b.score-a.score);
  leaderboard=leaderboard.slice(0,10);
  localStorage.setItem('shakeJarLB',JSON.stringify(leaderboard));
  renderLeaderboard();
  // Brief pause so user sees final card, then reset
  setTimeout(resetGame,1200);
});

$('tarotSkipBtn').addEventListener('click',resetGame);

$('tarotDlBtn').addEventListener('click',()=>{
  const name=$('tarotNameInput').value.trim()||'';
  drawTarotCard(name);
  const canvas=$('tarotCanvas');
  const link=document.createElement('a');
  link.download=`tarot-${(currentTarot?.name||'card').replace(/\s+/g,'-').toLowerCase()}-${Date.now()}.png`;
  link.href=canvas.toDataURL('image/png');
  link.click();
});

// ============ RESET ============
function resetGame(){
  tarotStage.classList.remove('active');
  burstStage.classList.remove('active');
  bctx.clearRect(0,0,burstCanvas.width,burstCanvas.height);
  burstVideo.pause();
  energy=0;sessionScore=0;
  sessionScoreEl.textContent='0';
  updateUI();
  gameLoop();
}

// ============ LEADERBOARD ============
function renderLeaderboard(){
  const best=leaderboard[0]?.score||0;
  bestScoreEl.textContent=best?best.toLocaleString():'–';
  lbRows.innerHTML=leaderboard.length===0
    ?'<div class="lb-empty">NO SCORES YET</div>'
    :leaderboard.map((e,i)=>`<div class="lb-row ${i===0?'top':''}"><span class="lb-rank">${i+1}</span><span class="lb-name">${e.name}</span><span class="lb-score-val">${e.score.toLocaleString()}</span></div>`).join('');
}
renderLeaderboard();

// Pressure lines
for(let i=0;i<5;i++){
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  const x1=25+Math.random()*110,y=100+Math.random()*80;
  l.setAttribute('x1',x1);l.setAttribute('y1',y);l.setAttribute('x2',x1+10+Math.random()*20);l.setAttribute('y2',y);
  l.setAttribute('stroke','rgba(255,255,255,0.4)');l.setAttribute('stroke-width','1');l.setAttribute('stroke-dasharray','4 3');
  pressureLines.appendChild(l);
}
updateUI();
</script>
